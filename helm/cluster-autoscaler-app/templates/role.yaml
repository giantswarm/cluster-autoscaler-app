apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cluster-autoscaler.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-autoscaler.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - cluster-autoscaler-status
  - cluster-autoscaler-priority-expander
  verbs:
  - delete
  - get
  - update
  - watch
{{- if and ( eq .Values.cloudProvider "clusterapi" ) ( not .Values.rbac.clusterScoped ) }}
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machinedeployments
  - machinepools
  - machines
  - machinesets
  verbs:
  - get
  - list
  - update
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machinedeployments/scale
  - machinepools/scale
  verbs:
  - get
  - patch
  - update
{{- end }}
{{- if ( not .Values.rbac.clusterScoped ) }}
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
- apiGroups:
  - coordination.k8s.io
  resourceNames:
  - cluster-autoscaler
  resources:
  - leases
  verbs:
  - get
  - update
{{- end }}
